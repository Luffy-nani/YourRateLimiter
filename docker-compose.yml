version: '3.8'

services:
  app:
    build: .
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    ports:
      - "3000:3000"
    volumes:
    - .:/app              # copy everything from local → container
    - /app/node_modules   # except, keep container's own node_modules

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data: